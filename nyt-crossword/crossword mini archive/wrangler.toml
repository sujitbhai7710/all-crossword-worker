name = "nyt-mini-archive"
main = "./src/index.js"
compatibility_date = "2023-10-30"
account_id = "103ef4d379758787a38406700a2dc67a"

[triggers]
crons = [
  "1 3 * * *",   # Daily at 3:01 AM UTC (10:01 PM EST)
  "11 3 * * *",  # Backup: Daily at 3:11 AM UTC (10:11 PM EST)
  "1 23 * * 6",  # Saturdays at 11:01 PM UTC (6:01 PM EST for Sunday puzzle)
  "11 23 * * 6"  # Backup: Saturdays at 11:11 PM UTC (6:11 PM EST)
]

[[d1_databases]]
binding = "DB"
database_name = "nyt_mini_crosswords"
database_id = "cb029f07-c69b-4ff6-bc12-f00a81ba2f5d" # The user's production database ID

[vars]
# API_KEY is now stored as a secret in Cloudflare 
