name = "crossword-archive-worker"
main = "src/index.js"
compatibility_date = "2023-08-01"

[[d1_databases]]
binding = "DB"
database_name = "crossword_archive"
database_id = "c1a8e713-a12a-4376-aafa-1b934fe236af" 

[[kv_namespaces]]
binding = "HOT_CACHE"
id = "d46351efbdf34cfea46318da1aec71d2"
preview_id = "d46351efbdf34cfea46318da1aec71d2"

# Scheduled triggers for daily puzzle updates
[triggers]
crons = [
  # 6:00 AM IST (00:30 UTC) 
  "0 0 * * *",
  
  # 10:00 AM IST (04:30 UTC)
  "30 4 * * *",
  
  # 3:00 PM IST (09:30 UTC)
  "30 9 * * *"
]

# Optional API token for securing write endpoints
# Uncomment and set this to enable token-based authentication
# [vars]
# API_TOKEN = "your-secret-token-here" 
